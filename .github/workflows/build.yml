name: Android CI

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5  # 从 v3 升级到 v5
    - name: set up JDK 11
      uses: actions/setup-java@v4  # 从 v3 升级到 v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Build with Gradle
      run: ./gradlew assembleDebug
    - name: Upload APK
      uses: actions/upload-artifact@v4  # 从 v3 升级到 v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/*.apk
